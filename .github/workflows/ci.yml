name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test-part4:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: part4

    env:
      MONGODB_URI: ${{ secrets.MONGODB_URI }}
      PORT: 3003
      SECRET: ${{ secrets.SECRET }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm test
